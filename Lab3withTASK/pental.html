<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="shop.css">
    <title>Pental Shop</title>
</head>
<body>
    <h1>Welcome to Pental Shop</h1>

    <h2>Our Products</h2>
    <p>Here are some of our amazing products!</p>
    <table class="product-table" border="1">
        <tr>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Pencils</td>
            <td>100</td>
            <td>In Stock</td>
        </tr>
        <tr>
            <td>Notebooks</td>
            <td>50</td>
            <td>Low Stock!</td>
        </tr>
        <tr>
            <td>Markers</td>
            <td>15</td> 
            <td>In Stock</td>
        </tr>
    </table>

    <br/>
    <br/>

    <div class="table-box">
        <table id="123">
            <h1>Contact Information</h1>
            <br/>
            <tr>
                <td>Name</td>
                <td><input type="text" name="name"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email" name="email"></td>
            </tr>
            <tr>
                <td>Message</td>
                <td><textarea name="message"></textarea></td>
            </tr>
            <tr>
                <td></td>
                <td><input type="submit" value="Submit"></td>
            </tr>
        </table>
    </div>
   

</body>
</html>
